<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Talkie ORT Direct Probe</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #0b0f14;
        color: #e6edf7;
      }

      body {
        margin: 0;
        padding: 32px;
      }

      main {
        max-width: 920px;
      }

      dl {
        display: grid;
        grid-template-columns: max-content 1fr;
        gap: 8px 16px;
      }

      dt {
        color: #8fa1b8;
      }

      pre {
        overflow: auto;
        white-space: pre-wrap;
        border: 1px solid #293441;
        border-radius: 8px;
        padding: 16px;
        background: #101720;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Talkie ORT Direct Probe</h1>
      <dl>
        <dt>Status</dt>
        <dd id="status">starting</dd>
        <dt>Model</dt>
        <dd id="model">--</dd>
        <dt>Execution provider</dt>
        <dd id="ep">--</dd>
        <dt>External chunks</dt>
        <dd id="chunks">--</dd>
        <dt>GPU limits</dt>
        <dd id="limits">--</dd>
      </dl>
      <pre id="log"></pre>
    </main>
    <script type="module" src="/src/ortDirectProbe.ts"></script>
  </body>
</html>
